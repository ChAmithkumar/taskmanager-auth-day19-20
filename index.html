<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
   body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #00d5ff);
    margin: 0;
    padding: 0;
    color: white;
}

/* MAIN CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* GLASS CARD */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* ROW LAYOUT */
.row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

/* INPUTS */
input, select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #4facfe;
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #00c6ff;
}

/* LOGOUT */
.logout {
    background: #ff4b5c;
}

/* TASK LIST */
ul {
    list-style: none;
    padding: 0;
}

li {
    background: rgba(24, 49, 59, 0.822);
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeIn 0.4s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}

/* COMPLETED */
.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

/* PRIORITY BADGES */
.priority {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin-left: 10px;
}

.high { background: #ff4b5c; }
.medium { background: #ffa502; }
.low { background: #2ed573; }

/* SEARCH */
#search {
    width: 100%;
    margin-top: 10px;
}

/* Responsive */
@media (max-width: 600px) {
    li {
        flex-direction: column;
        align-items: flex-start;
    }

    li div {
        margin-top: 5px;
    }
}
    </style>
</head>
<body>

<div class="container">

<h1>🚀 Task Manager</h1>

<div class="card">
<h3>Signup</h3>
<div class="row">
<input id="sname" placeholder="Name">
<input id="semail" placeholder="Email">
<input id="spass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>
</div>

<div class="card">
<h3>Login</h3>
<div class="row">
<input id="lemail" placeholder="Email">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="card">
<div class="row">
<input id="taskInput" placeholder="New Task">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Urgent</option>
</select>

<input type="date" id="dueDate">

<select id="priority">
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>

<button onclick="addTask()">Add</button>
</div>

<input id="search" placeholder="Search..." onkeyup="searchTask()">
</div>

<ul id="taskList"></ul>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const API = "https://taskmanager-auth-day19.onrender.com"; // 🔁 your backend

/* ================= AUTH ================= */

// SIGNUP
function signup() {
    axios.post(API + "/signup", {
        name: sname.value,
        email: semail.value,
        password: spass.value
    })
    .then(() => alert("Signup success"))
    .catch(err => {
        console.error(err);
        alert(err.response?.data?.msg || "Signup failed");
    });
}

// LOGIN
function login() {
    axios.post(API + "/login", {
        email: lemail.value,
        password: lpass.value
    })
    .then(res => {
        localStorage.setItem("token", res.data.token);
        alert("Login success");
        loadTasks();
    })
    .catch(() => alert("Login failed"));
}

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    alert("Logged out");
    location.reload();
}

/* ================= TASKS ================= */

// LOAD TASKS
function loadTasks() {
    axios.get(API + "/tasks", {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => {
        const tasks = res.data;
        taskList.innerHTML = "";

        tasks.forEach(t => {
            taskList.innerHTML += `
            <li>
                <span class="${t.completed ? 'completed' : ''}">
                    ${t.title} (${t.category})
                    <span class="priority ${t.priority.toLowerCase()}">
                        ${t.priority}
                    </span>
                </span>

                <div>
                    <button onclick="toggleTask('${t._id}', ${!t.completed})"><i class="fas fa-check"></i></button>
                    <button onclick="editTask('${t._id}', '${t.title}')"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteTask('${t._id}')"><i class="fas fa-trash"></i></button>
                </div>
            </li>`;
        });
    });
}
// ADD TASK
function addTask() {
    if (!taskInput.value) return alert("Enter task");

    axios.post(API + "/tasks", {
        title: taskInput.value,
        category: category.value,
        priority: priority.value,
        dueDate: dueDate.value
    }, {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(() => {
        taskInput.value = "";
        loadTasks();
    });
}

// TOGGLE
function toggleTask(id, completed) {
    axios.put(API + "/tasks/" + id,
        { completed },
        {
            headers: {
                Authorization: "Bearer " + localStorage.getItem("token")
            }
        }
    )
    .then(() => loadTasks());
}

// DELETE
function deleteTask(id) {
    axios.delete(API + "/tasks/" + id, {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(() => loadTasks());
}

// EDIT
function editTask(id, oldTitle) {
    const newTitle = prompt("Edit task:", oldTitle);
    if (!newTitle) return;

    axios.put(API + "/tasks/" + id,
        { title: newTitle },
        {
            headers: {
                Authorization: "Bearer " + localStorage.getItem("token")
            }
        }
    )
    .then(() => loadTasks());
}

// SEARCH
function searchTask() {
    const value = search.value.toLowerCase();

    document.querySelectorAll("#taskList li").forEach(li => {
        li.style.display =
            li.innerText.toLowerCase().includes(value) ? "" : "none";
    });
}

// AUTO LOAD (if already logged in)
if (localStorage.getItem("token")) {
    loadTasks();
}
</script>

</body>
</html>
