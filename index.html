<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 0;
    color: #333;
}

/* Container */
body > * {
    max-width: 800px;
    margin: auto;
}

/* Card Layout */
h1, h3, input, select, button, ul {
    margin-top: 15px;
}

h1 {
    text-align: center;
    color: white;
    margin-top: 30px;
}

/* Sections */
h3 {
    color: #444;
    border-bottom: 2px solid #ddd;
    padding-bottom: 5px;
}

/* Inputs */
input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    margin: 5px;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px #667eea;
}

/* Buttons */
button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
    transform: scale(1.05);
}

/* Logout Button */
button:nth-of-type(2) {
    background: #e53e3e;
}

button:nth-of-type(2):hover {
    background: #c53030;
}

/* Task List */
ul {
    list-style: none;
    padding: 0;
}

li {
    background: white;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

/* Completed Task */
.completed {
    text-decoration: line-through;
    color: gray;
}

/* Priority Badges */
.priority {
    padding: 3px 10px;
    border-radius: 20px;
    color: white;
    font-size: 12px;
    margin-left: 10px;
}

.high {
    background: #e53e3e;
}

.medium {
    background: #dd6b20;
}

.low {
    background: #38a169;
}

/* Task Buttons */
li button {
    margin-left: 5px;
    font-size: 12px;
}

/* Search Box */
#search {
    width: 95%;
}

/* Responsive */
@media (max-width: 600px) {
    li {
        flex-direction: column;
        align-items: flex-start;
    }

    li div {
        margin-top: 5px;
    }
}
    </style>
</head>
<body>

<h1>🚀 Task Manager</h1>

<!-- SIGNUP -->
<h3>Signup</h3>
<input id="sname" placeholder="Name">
<input id="semail" placeholder="Email">
<input id="spass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<hr>

<!-- LOGIN -->
<h3>Login</h3>
<input id="lemail" placeholder="Email">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<hr>

<!-- TASK INPUT -->
<input id="taskInput" placeholder="New Task">

<select id="category">
    <option>Work</option>
    <option>Personal</option>
    <option>Urgent</option>
</select>

<input type="date" id="dueDate">

<select id="priority">
    <option>High</option>
    <option>Medium</option>
    <option>Low</option>
</select>

<button onclick="addTask()">Add Task</button>

<input id="search" placeholder="Search..." onkeyup="searchTask()">

<ul id="taskList"></ul>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const API = "https://taskmanager-auth-day19.onrender.com"; // 🔁 your backend

/* ================= AUTH ================= */

// SIGNUP
function signup() {
    axios.post(API + "/signup", {
        name: sname.value,
        email: semail.value,
        password: spass.value
    })
    .then(() => alert("Signup success"))
    .catch(err => {
        console.error(err);
        alert(err.response?.data?.msg || "Signup failed");
    });
}

// LOGIN
function login() {
    axios.post(API + "/login", {
        email: lemail.value,
        password: lpass.value
    })
    .then(res => {
        localStorage.setItem("token", res.data.token);
        alert("Login success");
        loadTasks();
    })
    .catch(() => alert("Login failed"));
}

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    alert("Logged out");
    location.reload();
}

/* ================= TASKS ================= */

// LOAD TASKS
function loadTasks() {
    axios.get(API + "/tasks", {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => {
        const tasks = res.data;
        taskList.innerHTML = "";

        tasks.forEach(t => {
            taskList.innerHTML += `
            <li>
                <span class="${t.completed ? 'completed' : ''}">
                    ${t.title} (${t.category})
                    <span class="priority ${t.priority.toLowerCase()}">
                        ${t.priority}
                    </span>
                </span>

                <div>
                    <button onclick="toggleTask('${t._id}', ${!t.completed})">Complete</button>
                    <button onclick="editTask('${t._id}', '${t.title}')">Edit</button>
                    <button onclick="deleteTask('${t._id}')">Delete</button>
                </div>
            </li>`;
        });
    });
}
// ADD TASK
function addTask() {
    if (!taskInput.value) return alert("Enter task");

    axios.post(API + "/tasks", {
        title: taskInput.value,
        category: category.value,
        priority: priority.value,
        dueDate: dueDate.value
    }, {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(() => {
        taskInput.value = "";
        loadTasks();
    });
}

// TOGGLE
function toggleTask(id, completed) {
    axios.put(API + "/tasks/" + id,
        { completed },
        {
            headers: {
                Authorization: "Bearer " + localStorage.getItem("token")
            }
        }
    )
    .then(() => loadTasks());
}

// DELETE
function deleteTask(id) {
    axios.delete(API + "/tasks/" + id, {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(() => loadTasks());
}

// EDIT
function editTask(id, oldTitle) {
    const newTitle = prompt("Edit task:", oldTitle);
    if (!newTitle) return;

    axios.put(API + "/tasks/" + id,
        { title: newTitle },
        {
            headers: {
                Authorization: "Bearer " + localStorage.getItem("token")
            }
        }
    )
    .then(() => loadTasks());
}

// SEARCH
function searchTask() {
    const value = search.value.toLowerCase();

    document.querySelectorAll("#taskList li").forEach(li => {
        li.style.display =
            li.innerText.toLowerCase().includes(value) ? "" : "none";
    });
}

// AUTO LOAD (if already logged in)
if (localStorage.getItem("token")) {
    loadTasks();
}
</script>

</body>
</html>
